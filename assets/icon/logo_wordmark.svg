<svg xmlns="http://www.w3.org/2000/svg"
     width="600" height="380"
     viewBox="0 0 600 380"
     role="img" aria-label="DocShelf — Files organized · Offline">
  <!--
    DocShelf wordmark.
    Stacked: "Doc" indigo on top, "Shelf" amber below, with the
    tagline "FILES ORGANIZED · OFFLINE" in small caps underneath.
    Minimal, word-prominent.
  -->
  <style>
    .word    { font: 900 132px 'Nunito', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif; letter-spacing: -3px; }
    .doc     { fill: #3D5AFE; }
    .shelf   { fill: #FFB300; }
    .tagline {
      font: 800 18px 'Nunito', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
      letter-spacing: 4px;
      fill: #5C6678;
    }
  </style>

  <text x="50%" y="142" text-anchor="middle" class="word doc">Doc</text>
  <text x="50%" y="278" text-anchor="middle" class="word shelf">Shelf</text>

  <!-- Subtle shelf line between Shelf and tagline -->
  <line x1="220" y1="306" x2="380" y2="306"
        stroke="#FFB300" stroke-width="3" stroke-linecap="round"
        stroke-opacity="0.7"/>

  <text x="50%" y="346" text-anchor="middle" class="tagline">
    FILES ORGANIZED · OFFLINE
  </text>
</svg>
