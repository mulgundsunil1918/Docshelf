<svg xmlns="http://www.w3.org/2000/svg"
     width="1024" height="1024"
     viewBox="0 0 1024 1024"
     role="img" aria-label="DocShelf icon">
  <!--
    DocShelf app-icon mark.

    Three horizontally-stacked "documents" of varying widths, with an
    amber accent stripe on the most prominent bar, sitting above a
    crisp white shelf line. Communicates "organized stack of files on
    a shelf" at a glance.
  -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3D5AFE"/>
      <stop offset="100%" stop-color="#2D3FB8"/>
    </linearGradient>
  </defs>

  <!-- Indigo gradient rounded square background -->
  <rect width="1024" height="1024" rx="220" fill="url(#bg)"/>

  <!--
    Three stacked "papers", widening as they go down. All are centered
    on the canvas (x mid = 512) so the stack reads as a deliberate
    pyramid, not a random offset.
  -->

  <!-- Top: white, narrowest          (width 380, x = (1024-380)/2 = 322) -->
  <rect x="322" y="320" width="380" height="80" rx="40" fill="#FFFFFF"/>

  <!-- Middle: pale white at 65%, medium  (width 500, x = (1024-500)/2 = 262) -->
  <rect x="262" y="436" width="500" height="80" rx="40"
        fill="#FFFFFF" fill-opacity="0.65"/>

  <!-- Bottom: amber, widest         (width 620, x = (1024-620)/2 = 202) -->
  <rect x="202" y="552" width="620" height="80" rx="40" fill="#FFB300"/>

  <!-- White shelf line beneath, also centered (length 480) -->
  <line x1="272" y1="712" x2="752" y2="712"
        stroke="#FFFFFF" stroke-width="22" stroke-linecap="round"/>
</svg>
